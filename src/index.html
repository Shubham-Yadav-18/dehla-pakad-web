<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dehla Pakad - Live</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #2c3e50; color: white; padding-top: 20px; }
        .playing-card {
            display: inline-block;
            width: 100px;
            height: 140px;
            background-color: white;
            color: black;
            border-radius: 8px;
            margin: 5px;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .playing-card:hover { transform: translateY(-10px); }
        .table-area { min-height: 180px; background-color: #34495e; border-radius: 10px; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row mb-3">
        <div class="col-md-8">
            <h2>Dehla Pakad Table</h2>
            <p>Status: <span id="connection-status" class="text-warning">Connecting...</span></p>
            <p>Phase: <strong id="phase" class="text-info">WAITING</strong> | Trump: <strong id="trump" class="text-danger">NONE</strong></p>
            <p class="fs-4">Turn: <span id="turn-indicator" class="fw-bold text-warning">Waiting...</span></p>
        </div>
        <div class="col-md-4 text-end">
            <div class="card bg-dark text-white p-2">
                <h5>Scoreboard (Dehlas)</h5>
                <p class="m-0">Team A: <span id="scoreA">0</span></p>
                <p class="m-0">Team B: <span id="scoreB">0</span></p>
            </div>
        </div>
    </div>

    <!-- The Center Table (Accumulator & Current Trick) -->
    <div class="row mb-4">
        <div class="col-12">
            <h4>Table</h4>
            <div id="table-cards" class="table-area d-flex flex-wrap align-items-center justify-content-center">
                <!-- Played cards will appear here -->
            </div>
        </div>
    </div>

    <!-- The Player's Hand -->
    <div class="row">
        <div class="col-12">
            <h4>My Hand</h4>
            <div id="my-hand" class="d-flex flex-wrap">
                <!-- Player's cards will appear here -->
            </div>
        </div>
    </div>
</div>

<script>
    const ws = new WebSocket("ws://localhost:7070/game");

    ws.onopen = () => {
        document.getElementById("connection-status").innerText = "Connected!";
        document.getElementById("connection-status").className = "text-success";
    };

    ws.onclose = () => {
        document.getElementById("connection-status").innerText = "Disconnected.";
        document.getElementById("connection-status").className = "text-danger";
    };

    ws.onmessage = (event) => {
        const state = JSON.parse(event.data);

        document.getElementById("phase").innerText = state.currentPhase;
        document.getElementById("trump").innerText = state.trumpSuit;
        document.getElementById("scoreA").innerText = state.teamAScore;
        document.getElementById("scoreB").innerText = state.teamBScore;

        // --- TURN LOGIC ---
        const isMyTurn = (state.myName === state.currentTurnPlayerName);
        const turnText = isMyTurn ? "🟩 YOUR TURN!" : `🟥 Waiting for ${state.currentTurnPlayerName}...`;
        document.getElementById("turn-indicator").innerText = turnText;

        const tableDiv = document.getElementById("table-cards");
        tableDiv.innerHTML = `<h5 class="w-100 text-center mb-3 text-warning">Pile Waiting to be Swept: ${state.accumulatedPileSize} cards</h5>`;

        state.currentTrickCards.forEach(cardStr => {
            tableDiv.innerHTML += `<div class="playing-card" style="cursor: default; border: 2px solid #3498db;">${cardStr}</div>`;
        });

        const handDiv = document.getElementById("my-hand");
        handDiv.innerHTML = "";
        state.myHand.forEach(cardStr => {
            // If it's my turn, the card is clickable and white. If not, it's greyed out and unclickable!
            if (isMyTurn) {
                handDiv.innerHTML += `<div class="playing-card" onclick="playCard('${cardStr}')">${cardStr}</div>`;
            } else {
                handDiv.innerHTML += `<div class="playing-card" style="background-color: #bdc3c7; cursor: not-allowed; opacity: 0.7;">${cardStr}</div>`;
            }
        });
    };

    function playCard(cardString) {
        const parts = cardString.split(" of ");
        const actionJson = {
            action: "PLAY_CARD",
            suit: parts[1],
            rank: parts[0]
        };
        ws.send(JSON.stringify(actionJson));
    }
</script>

</body>
</html>
